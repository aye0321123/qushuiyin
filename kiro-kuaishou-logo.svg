<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 快手官方风格 - 橙黄色 + K字闪电 -->
  <defs>
    <linearGradient id="ksOfficialGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffba00"/>
      <stop offset="100%" style="stop-color:#ff6a00"/>
    </linearGradient>
  </defs>
  
  <!-- 橙黄色渐变背景 -->
  <rect width="400" height="400" fill="url(#ksOfficialGrad)" rx="85"/>
  
  <!-- K字造型（快手风格） -->
  <g transform="translate(200, 180)" fill="#ffffff">
    <!-- K的竖线 -->
    <rect x="-60" y="-80" width="40" height="160" rx="5"/>
    
    <!-- K的上半部分 -->
    <path d="M -20 -10 L 70 -80 L 90 -60 L 10 0 Z"/>
    
    <!-- K的下半部分 -->
    <path d="M -20 10 L 10 0 L 90 60 L 70 80 Z"/>
  </g>
  
  <!-- KIRO 文字 -->
  <text x="200" y="330" 
        font-family="Arial Black, sans-serif" 
        font-size="55" 
        font-weight="900" 
        text-anchor="middle"
        fill="#ffffff"
        letter-spacing="2">KIRO</text>
</svg>