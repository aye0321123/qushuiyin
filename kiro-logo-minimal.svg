<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 纯白背景 -->
  <rect width="400" height="400" fill="#ffffff"/>
  
  <!-- 超极简 KIRO - 更粗的笔画 -->
  <g transform="translate(200, 200)" fill="#000000">
    <!-- K - 使用填充形状 -->
    <path d="M -150 -90 L -120 -90 L -120 -10 L -80 -90 L -45 -90 L -90 0 L -45 90 L -80 90 L -120 10 L -120 90 L -150 90 Z"/>
    
    <!-- I -->
    <rect x="-30" y="-90" width="30" height="180"/>
    
    <!-- R -->
    <path d="M 20 -90 L 50 -90 L 50 -10 L 80 -10 Q 110 -10 110 -50 Q 110 -90 80 -90 L 50 -90 L 50 -90 L 80 -90 Q 120 -90 120 -50 Q 120 0 90 5 L 125 90 L 90 90 L 60 10 L 50 10 L 50 90 L 20 90 Z"/>
    
    <!-- O -->
    <path d="M 140 -90 Q 180 -90 180 0 Q 180 90 140 90 Q 100 90 100 0 Q 100 -90 140 -90 M 140 -60 Q 130 -60 130 0 Q 130 60 140 60 Q 150 60 150 0 Q 150 -60 140 -60"/>
  </g>
</svg>