<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 视频号风格 V2 - 现代商务 -->
  
  <!-- 深绿色背景 -->
  <circle cx="200" cy="200" r="200" fill="#06ae56"/>
  
  <!-- 圆形边框 -->
  <circle cx="200" cy="200" r="170" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.2"/>
  
  <!-- 对勾 - 更粗更明显 -->
  <g transform="translate(200, 150)">
    <path d="M -90 5 L -35 60 L 110 -85" 
          stroke="#ffffff" 
          stroke-width="45" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none"/>
  </g>
  
  <!-- KIRO 文字 -->
  <text x="200" y="315" 
        font-family="Helvetica Neue, Arial, sans-serif" 
        font-size="75" 
        font-weight="700" 
        text-anchor="middle"
        fill="#ffffff"
        letter-spacing="5">KIRO</text>
</svg>