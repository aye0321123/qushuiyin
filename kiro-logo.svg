<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="400" height="400" fill="#ffffff"/>
  
  <!-- KIRO 字母设计 - 极简无衬线 -->
  <g transform="translate(200, 200)">
    <!-- K -->
    <path d="M -140 -80 L -140 80 M -140 0 L -80 -80 M -140 0 L -80 80" 
          stroke="#1a1a1a" 
          stroke-width="16" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none"/>
    
    <!-- I -->
    <path d="M -40 -80 L -40 80" 
          stroke="#1a1a1a" 
          stroke-width="16" 
          stroke-linecap="round" 
          fill="none"/>
    
    <!-- R -->
    <path d="M 20 -80 L 20 80 M 20 -80 L 80 -80 Q 100 -80 100 -40 Q 100 0 80 0 L 20 0 M 60 0 L 100 80" 
          stroke="#1a1a1a" 
          stroke-width="16" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none"/>
    
    <!-- O -->
    <ellipse cx="140" cy="0" rx="40" ry="80" 
             stroke="#1a1a1a" 
             stroke-width="16" 
             fill="none"/>
  </g>
  
  <!-- 几何装饰线条（可选，极简风格） -->
  <circle cx="200" cy="200" r="180" 
          stroke="#e0e0e0" 
          stroke-width="2" 
          fill="none" 
          opacity="0.3"/>
</svg>