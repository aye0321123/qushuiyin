<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="400" height="400" fill="#f8f8f8"/>
  
  <!-- 几何边框 -->
  <rect x="40" y="40" width="320" height="320" 
        stroke="#2a2a2a" 
        stroke-width="3" 
        fill="none" 
        rx="8"/>
  
  <!-- KIRO - 几何风格 -->
  <g transform="translate(200, 200)" fill="#1a1a1a">
    <!-- K -->
    <rect x="-145" y="-70" width="20" height="140"/>
    <polygon points="-125,-70 -95,-70 -125,-10"/>
    <polygon points="-125,10 -95,70 -125,70"/>
    
    <!-- I -->
    <rect x="-45" y="-70" width="20" height="140"/>
    
    <!-- R -->
    <rect x="15" y="-70" width="20" height="140"/>
    <path d="M 35 -70 L 75 -70 Q 95 -70 95 -45 Q 95 -20 75 -20 L 35 -20 Z"/>
    <polygon points="60,-20 95,70 70,70 40,-20"/>
    
    <!-- O -->
    <path d="M 125 -70 L 165 -70 Q 185 -70 185 0 Q 185 70 165 70 L 125 70 Q 105 70 105 0 Q 105 -70 125 -70 M 125 -50 L 125 50 L 165 50 Q 165 50 165 0 Q 165 -50 165 -50 Z"/>
  </g>
  
  <!-- 装饰线条 -->
  <line x1="80" y1="200" x2="120" y2="200" stroke="#d0d0d0" stroke-width="2"/>
  <line x1="280" y1="200" x2="320" y2="200" stroke="#d0d0d0" stroke-width="2"/>
</svg>