<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 渐变背景（可选） -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5f5f5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  
  <!-- 现代简约 KIRO -->
  <g transform="translate(200, 200)">
    <!-- K -->
    <path d="M -140 -75 L -140 75 M -140 -5 L -75 -75 M -140 5 L -75 75" 
          stroke="#000000" 
          stroke-width="18" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none"/>
    
    <!-- I -->
    <line x1="-35" y1="-75" x2="-35" y2="75" 
          stroke="#000000" 
          stroke-width="18" 
          stroke-linecap="round"/>
    
    <!-- R -->
    <path d="M 30 -75 L 30 75 M 30 -75 L 85 -75 Q 110 -75 110 -37.5 Q 110 0 85 0 L 30 0 M 70 0 L 110 75" 
          stroke="#000000" 
          stroke-width="18" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none"/>
    
    <!-- O -->
    <circle cx="145" cy="0" r="42" 
            stroke="#000000" 
            stroke-width="18" 
            fill="none"/>
  </g>
  
  <!-- 微妙的圆形装饰 -->
  <circle cx="200" cy="200" r="165" 
          stroke="#e8e8e8" 
          stroke-width="1" 
          fill="none"/>
</svg>