<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 透明背景版本 - 适合任何背景 -->
  
  <!-- KIRO - 纯黑字体，无背景 -->
  <g transform="translate(200, 200)">
    <!-- K -->
    <path d="M -140 -75 L -140 75 M -140 -5 L -75 -75 M -140 5 L -75 75" 
          stroke="#000000" 
          stroke-width="20" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none"/>
    
    <!-- I -->
    <line x1="-35" y1="-75" x2="-35" y2="75" 
          stroke="#000000" 
          stroke-width="20" 
          stroke-linecap="round"/>
    
    <!-- R -->
    <path d="M 30 -75 L 30 75 M 30 -75 L 85 -75 Q 110 -75 110 -37.5 Q 110 0 85 0 L 30 0 M 70 0 L 110 75" 
          stroke="#000000" 
          stroke-width="20" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none"/>
    
    <!-- O -->
    <circle cx="145" cy="0" r="42" 
            stroke="#000000" 
            stroke-width="20" 
            fill="none"/>
  </g>
</svg>