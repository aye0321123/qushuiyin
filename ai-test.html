<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI问答测试</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #1a1a2e;
      color: #eee;
    }
    #chatBox {
      border: 2px solid #0f3460;
      border-radius: 10px;
      padding: 20px;
      min-height: 400px;
      max-height: 500px;
      overflow-y: auto;
      background: #16213e;
      margin-bottom: 20px;
    }
    .message {
      margin: 10px 0;
      padding: 12px;
      border-radius: 8px;
      animation: fadeIn 0.3s;
    }
    .user { background: rgba(0,212,255,0.15); border-left: 3px solid #00d4ff; }
    .assistant { background: rgba(123,47,255,0.15); border-left: 3px solid #7b2fff; }
    .error { background: rgba(255,77,109,0.15); border-left: 3px solid #ff4d6d; color: #ff4d6d; }
    .header { font-size: 11px; font-weight: bold; margin-bottom: 5px; opacity: 0.8; }
    textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #0f3460;
      border-radius: 8px;
      background: #16213e;
      color: #eee;
      font-size: 14px;
      resize: vertical;
      font-family: inherit;
    }
    button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #7b2fff, #00d4ff);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      margin-right: 10px;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button:hover:not(:disabled) { opacity: 0.9; }
    #debugLog {
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 15px;
      margin-top: 20px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
    }
    .log-item { margin: 5px 0; }
    .log-send { color: #00d4ff; }
    .log-receive { color: #00ffaa; }
    .log-error { color: #ff4d6d; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <h1>🤖 AI问答测试工具</h1>
  <p style="color: #888;">测试DeepSeek API连接和连续对话功能</p>

  <div id="chatBox"></div>

  <textarea id="question" rows="3" placeholder="输入你的问题..."></textarea>
  <div>
    <button onclick="sendQuestion()" id="sendBtn">💬 发送问题</button>
    <button onclick="clearChat()" style="background: #ff4d6d;">🗑️ 清空对话</button>
    <button onclick="testAPI()" style="background: #00ffaa; color: #000;">🔧 测试API连接</button>
  </div>

  <div id="debugLog">
    <div style="color: #00d4ff; font-weight: bold; margin-bottom: 10px;">📋 调试日志：</div>
  </div>

  <script>
    const API_URL = 'http://43.139.203.146:8050/v1/chat/completions';
    const API_KEY = 'sk-linzi';
    const MODEL = 'deepseek-chat';
    
    let chatMessages = [];

    function log(message, type = 'info') {
      const logDiv = document.getElementById('debugLog');
      const time = new Date().toLocaleTimeString();
      const className = type === 'send' ? 'log-send' : type === 'receive' ? 'log-receive' : type === 'error' ? 'log-error' : '';
      logDiv.innerHTML += `<div class="log-item ${className}">[${time}] ${message}</div>`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    function addMessage(role, content) {
      const chatBox = document.getElementById('chatBox');
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${role}`;
      
      const header = document.createElement('div');
      header.className = 'header';
      header.textContent = role === 'user' ? '👤 你' : role === 'assistant' ? '🤖 AI助手' : '⚠️ 错误';
      
      const text = document.createElement('div');
      text.textContent = content;
      text.style.whiteSpace = 'pre-wrap';
      
      msgDiv.appendChild(header);
      msgDiv.appendChild(text);
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function testAPI() {
      log('🔧 开始测试API连接...', 'send');
      
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEY}`
          },
          body: JSON.stringify({
            model: MODEL,
            messages: [
              { role: 'system', content: '你是一个AI助手' },
              { role: 'user', content: '你好，请回复"测试成功"' }
            ],
            temperature: 0.7,
            max_tokens: 50
          })
        });

        log(`📡 HTTP状态: ${response.status} ${response.statusText}`, response.ok ? 'receive' : 'error');

        const data = await response.json();
        log(`📦 响应数据: ${JSON.stringify(data, null, 2)}`, 'receive');

        if (data.choices && data.choices[0]) {
          log('✅ API连接成功！', 'receive');
          addMessage('assistant', '测试结果：' + data.choices[0].message.content);
        } else {
          log('❌ API返回格式异常', 'error');
          addMessage('error', 'API返回格式异常：' + JSON.stringify(data));
        }
      } catch (error) {
        log(`❌ 连接失败: ${error.message}`, 'error');
        addMessage('error', '连接失败：' + error.message);
      }
    }

    async function sendQuestion() {
      const question = document.getElementById('question').value.trim();
      if (!question) {
        alert('请输入问题');
        return;
      }

      const btn = document.getElementById('sendBtn');
      btn.disabled = true;
      btn.textContent = '🤔 思考中...';

      document.getElementById('question').value = '';
      addMessage('user', question);

      chatMessages.push({
        role: 'user',
        content: question
      });

      log(`📤 发送问题 (第${Math.ceil(chatMessages.length/2)}轮): ${question}`, 'send');

      try {
        const messagesToSend = [
          { role: 'system', content: '你是一个友好、专业的AI助手。请用简洁、易懂的语言回答用户的问题。' },
          ...chatMessages.slice(-20)
        ];

        log(`📊 消息数量: ${messagesToSend.length} (包含system消息)`, 'send');

        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEY}`
          },
          body: JSON.stringify({
            model: MODEL,
            messages: messagesToSend,
            temperature: 0.7,
            max_tokens: 800
          })
        });

        log(`📡 HTTP状态: ${response.status}`, response.ok ? 'receive' : 'error');

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();
        log(`📥 收到响应: ${data.choices ? '有choices' : '无choices'}`, 'receive');

        if (data.choices && data.choices[0] && data.choices[0].message) {
          const answer = data.choices[0].message.content.trim();
          log(`✅ AI回答: ${answer.substring(0, 50)}...`, 'receive');
          
          chatMessages.push({
            role: 'assistant',
            content: answer
          });
          
          addMessage('assistant', answer);
        } else {
          const errorMsg = data.error?.message || data.msg || '未知错误';
          log(`❌ API错误: ${errorMsg}`, 'error');
          addMessage('error', `AI回答失败：${errorMsg}`);
          chatMessages.pop();
        }
      } catch (error) {
        log(`❌ 异常: ${error.message}`, 'error');
        addMessage('error', `网络错误：${error.message}`);
        chatMessages.pop();
      } finally {
        btn.disabled = false;
        btn.textContent = '💬 发送问题';
      }
    }

    function clearChat() {
      if (chatMessages.length === 0) return;
      if (!confirm('确定清空所有对话？')) return;
      
      chatMessages = [];
      document.getElementById('chatBox').innerHTML = '';
      log('🗑️ 对话已清空', 'info');
    }

    // 回车发送
    document.getElementById('question').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && e.ctrlKey) {
        e.preventDefault();
        sendQuestion();
      }
    });

    log('✅ 测试工具已加载，可以开始测试', 'receive');
    log(`🔗 API地址: ${API_URL}`, 'info');
    log(`🔑 API密钥: ${API_KEY}`, 'info');
  </script>
</body>
</html>
