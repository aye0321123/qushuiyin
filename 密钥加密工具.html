<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>密钥加密工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .input-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      color: #555;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
    }
    input, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Courier New', monospace;
      transition: border-color 0.3s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-bottom: 10px;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }
    .btn:active {
      transform: translateY(0);
    }
    .result {
      background: #f5f5f5;
      padding: 16px;
      border-radius: 10px;
      margin-top: 20px;
      display: none;
    }
    .result.show {
      display: block;
    }
    .result-label {
      color: #666;
      font-size: 12px;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .result-value {
      background: white;
      padding: 12px;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      word-break: break-all;
      border: 1px solid #e0e0e0;
    }
    .copy-btn {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .copy-btn:hover {
      background: #45a049;
    }
    .info {
      background: #e3f2fd;
      border-left: 4px solid #2196F3;
      padding: 12px 16px;
      margin-top: 20px;
      border-radius: 6px;
      font-size: 13px;
      color: #1976D2;
    }
    .warning {
      background: #fff3e0;
      border-left: 4px solid #ff9800;
      padding: 12px 16px;
      margin-top: 20px;
      border-radius: 6px;
      font-size: 13px;
      color: #f57c00;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 密钥加密工具</h1>
    <p class="subtitle">用于加密 API 密钥，防止源码泄露</p>

    <div class="input-group">
      <label>原始密钥</label>
      <input type="text" id="originalKey" placeholder="输入需要加密的密钥，例如：sk-123456">
    </div>

    <button class="btn" onclick="encryptKey()">🔒 加密密钥</button>

    <div class="result" id="result">
      <div class="result-label">加密后的密钥（复制到代码中）：</div>
      <div class="result-value" id="encryptedKey"></div>
      <button class="copy-btn" onclick="copyEncrypted()">📋 复制加密密钥</button>
    </div>

    <div class="info">
      <strong>💡 使用说明：</strong><br>
      1. 在上方输入框输入原始密钥<br>
      2. 点击"加密密钥"按钮<br>
      3. 复制加密后的密钥<br>
      4. 替换 index.html 中的 ENCRYPTED_GLOBAL_KEY 或 ENCRYPTED_AI_KEY
    </div>

    <div class="warning">
      <strong>⚠️ 安全提示：</strong><br>
      • 加密后的密钥仍可被反向解密，但增加了获取难度<br>
      • 建议定期更换密钥<br>
      • 不要在公开场合分享加密后的密钥
    </div>

    <hr style="margin: 30px 0; border: none; border-top: 1px solid #e0e0e0;">

    <div class="input-group">
      <label>解密测试（验证加密是否正确）</label>
      <input type="text" id="testEncrypted" placeholder="输入加密后的密钥进行测试">
    </div>

    <button class="btn" onclick="decryptKey()">🔓 解密测试</button>

    <div class="result" id="decryptResult">
      <div class="result-label">解密后的密钥：</div>
      <div class="result-value" id="decryptedKey"></div>
    </div>
  </div>

  <script>
    // 加密函数（与 index.html 中的解密函数对应）
    function encrypt(text) {
      let encrypted = '';
      for (let i = 0; i < text.length; i++) {
        encrypted += String.fromCharCode(text.charCodeAt(i) ^ 42);
      }
      return btoa(encrypted);
    }

    // 解密函数（用于测试）
    function decrypt(encrypted) {
      const decoded = atob(encrypted);
      let result = '';
      for (let i = 0; i < decoded.length; i++) {
        result += String.fromCharCode(decoded.charCodeAt(i) ^ 42);
      }
      return result;
    }

    function encryptKey() {
      const original = document.getElementById('originalKey').value.trim();
      if (!original) {
        alert('请输入原始密钥');
        return;
      }

      const encrypted = encrypt(original);
      document.getElementById('encryptedKey').textContent = encrypted;
      document.getElementById('result').classList.add('show');
    }

    function decryptKey() {
      const encrypted = document.getElementById('testEncrypted').value.trim();
      if (!encrypted) {
        alert('请输入加密后的密钥');
        return;
      }

      try {
        const decrypted = decrypt(encrypted);
        document.getElementById('decryptedKey').textContent = decrypted;
        document.getElementById('decryptResult').classList.add('show');
      } catch (e) {
        alert('解密失败，请检查输入的密钥是否正确');
      }
    }

    function copyEncrypted() {
      const text = document.getElementById('encryptedKey').textContent;
      navigator.clipboard.writeText(text).then(() => {
        alert('✅ 已复制到剪贴板');
      });
    }
  </script>
</body>
</html>
