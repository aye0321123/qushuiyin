<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 小红书官方风格 - 红色圆角方形 + R标志 -->
  
  <!-- 红色圆角方形背景 -->
  <rect width="400" height="400" fill="#ff2442" rx="85"/>
  
  <!-- 白色"R"造型（小红书风格） -->
  <g transform="translate(200, 200)" fill="#ffffff">
    <!-- R的竖线 -->
    <rect x="-50" y="-90" width="35" height="180" rx="5"/>
    
    <!-- R的上半圆 -->
    <path d="M -15 -90 L 40 -90 Q 80 -90 80 -45 Q 80 0 40 0 L -15 0 Z"/>
    
    <!-- R的斜腿 -->
    <path d="M 20 0 L 85 90 L 45 90 L -15 10 Z"/>
  </g>
  
  <!-- KIRO 文字（融入设计） -->
  <text x="200" y="360" 
        font-family="Arial Rounded MT Bold, sans-serif" 
        font-size="42" 
        font-weight="700" 
        text-anchor="middle"
        fill="#ffffff"
        letter-spacing="4"
        opacity="0.9">KIRO</text>
</svg>