<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,user-scalable=yes"/>
<meta name="description" content="无痕视频去水印工具 - 管理后台"/>
<meta name="theme-color" content="#050a14"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>管理后台 · 无痕解析</title>
<style>
:root{--bg:#050a14;--surface:#0d1626;--border:#1a2d4a;--accent:#00d4ff;--accent2:#7b2fff;--text:#e0eaff;--muted:#5a7a9a;--success:#00ffaa;--error:#ff4d6d;--warn:#ffaa00;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:"Segoe UI",system-ui,sans-serif;min-height:100vh;display:flex;}
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:var(--surface);border-right:1px solid var(--border);z-index:2;display:flex;flex-direction:column;}
.logo{padding:24px 20px;border-bottom:1px solid var(--border);font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nav{flex:1;padding:20px 0;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 20px;color:var(--muted);cursor:pointer;transition:all 0.2s;border-left:3px solid transparent;}
.nav-item:hover{background:rgba(0,212,255,0.05);color:var(--accent);}
.nav-item.active{background:rgba(0,212,255,0.08);color:var(--accent);border-left-color:var(--accent);}
.main{margin-left:240px;flex:1;padding:30px;position:relative;z-index:1;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;}
.topbar h2{font-size:24px;color:var(--text);}
.admin-badge{display:flex;align-items:center;gap:12px;}
.admin-name{font-size:14px;color:var(--muted);}
.logout-btn{padding:8px 16px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:13px;cursor:pointer;transition:all 0.2s;}
.logout-btn:hover{border-color:var(--error);color:var(--error);}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;position:relative;overflow:hidden;}
.stat-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent2),var(--accent));}
.stat-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.stat-value{font-size:28px;font-weight:700;color:var(--text);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;}
.search-box{width:100%;max-width:400px;padding:10px 16px;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;margin-bottom:20px;}
.search-box:focus{outline:none;border-color:var(--accent);}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:12px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);}
td{padding:12px;border-bottom:1px solid var(--border);font-size:14px;}
.btn{padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;transition:all 0.2s;border:none;}
.btn-primary{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;}
.btn-success{background:var(--success);color:#000;}
.btn-warn{background:var(--warn);color:#000;}
.btn-danger{background:var(--error);color:#fff;}
.btn-secondary{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn:hover{opacity:0.85;}
.badge{display:inline-block;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600;}
.badge-vip{background:rgba(255,204,0,0.15);color:#ffcc00;}
.badge-normal{background:rgba(90,122,154,0.15);color:var(--muted);}
.badge-banned{background:rgba(255,77,109,0.15);color:var(--error);}
.modal-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(6px);z-index:100;align-items:center;justify-content:center;}
.modal-mask.show{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto;}
.modal h3{margin-bottom:20px;color:var(--text);}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;}
.form-group input,.form-group select{width:100%;padding:10px 14px;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--accent);}
.form-actions{display:flex;gap:10px;margin-top:20px;}
.page{display:none;}
.page.active{display:block;}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:14px;}

/* 移动端响应式 */
@media (max-width: 768px) {
.sidebar{width:100%;height:auto;position:relative;border-right:none;border-bottom:1px solid var(--border);}
.main{margin-left:0;padding:20px 16px;}
.nav{display:flex;overflow-x:auto;padding:10px 0;white-space:nowrap;}
.nav-item{display:inline-flex;padding:10px 16px;border-left:none;border-bottom:3px solid transparent;}
.nav-item.active{border-left:none;border-bottom-color:var(--accent);}
.stats{grid-template-columns:1fr;}
.search-box{max-width:100%;}
table{font-size:12px;}
th,td{padding:8px 6px;}
.btn{padding:5px 10px;font-size:11px;}
.topbar{flex-direction:column;align-items:flex-start;gap:12px;}
.admin-badge{width:100%;justify-content:space-between;}
.form-group input,.form-group select{font-size:16px;}
.modal{margin:12px;padding:20px;}
}

@media (max-width: 500px) {
.logo{font-size:16px;padding:16px;}
.stat-value{font-size:24px;}
.card{padding:16px;}
table{display:block;overflow-x:auto;}
}
</style>
</head>
<body>

<div class="modal-mask show" id="loginModal">
<div class="modal">
<h3>🔐 管理员登录</h3>
<div class="form-group">
<label>用户名</label>
<input type="text" id="adminUser" placeholder="请输入管理员用户名"/>
</div>
<div class="form-group">
<label>密码</label>
<input type="password" id="adminPwd" placeholder="请输入管理员密码"/>
</div>
<div class="form-actions">
<button class="btn btn-primary" onclick="adminLogin()" style="flex:1">登录</button>
</div>
<p style="font-size:12px;color:var(--muted);margin-top:12px;">请使用管理员账号登录</p>
</div>
</div>

<div id="adminPanel" style="display:none;width:100%;">
<div class="sidebar">
<div class="logo">🔧 管理后台</div>
<div class="nav">
<div class="nav-item active" onclick="switchPage('overview')">📊 概览</div>
<div class="nav-item" onclick="switchPage('users')">👥 用户管理</div>
<div class="nav-item" onclick="switchPage('vip')">👑 会员管理</div>
<div class="nav-item" onclick="switchPage('cards')">🎫 卡密管理</div>
<div class="nav-item" onclick="switchPage('password')">🔑 修改密码</div>
</div>
<div style="padding:20px;border-top:1px solid var(--border);">
<a href="index.html" style="display:flex;align-items:center;gap:8px;padding:10px;background:rgba(0,212,255,0.1);border:1px solid var(--accent);border-radius:8px;color:var(--accent);text-decoration:none;font-size:13px;transition:all 0.2s;" onmouseover="this.style.background='rgba(0,212,255,0.15)'" onmouseout="this.style.background='rgba(0,212,255,0.1)'">
<span>🏠</span>
<span>返回用户页面</span>
</a>
</div>
</div>

<div class="main">
<div class="topbar">
<h2 id="pageTitle">数据概览</h2>
<div class="admin-badge">
<span class="admin-name">👤 管理员</span>
<button class="logout-btn" onclick="adminLogout()">退出登录</button>
</div>
</div>

<div id="overviewPage" class="page active">
<div class="stats" id="statsCards"></div>
<div class="card" style="margin-top:20px;">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
<h3 style="margin:0;font-size:14px;color:var(--muted);">数据管理</h3>
<div style="display:flex;gap:8px;flex-wrap:wrap;">
<button class="btn btn-success" onclick="exportUsersExcel()">📊 导出用户Excel</button>
<button class="btn btn-success" onclick="exportCardsExcel()">📊 导出卡密Excel</button>
<button class="btn btn-success" onclick="exportUsers()">📥 导出用户JSON</button>
<button class="btn btn-success" onclick="exportCards()">📥 导出卡密JSON</button>
<button class="btn btn-warn" onclick="exportAll()">📦 导出全部JSON</button>
</div>
</div>
<button class="btn btn-secondary" onclick="showDebugInfo()">查看 localStorage 数据</button>
<pre id="debugInfo" style="background:rgba(0,0,0,0.3);padding:12px;border-radius:8px;font-size:11px;color:var(--muted);margin-top:12px;display:none;overflow:auto;max-height:300px;"></pre>
</div>
</div>

<div id="usersPage" class="page">
<input type="text" class="search-box" id="userSearch" placeholder="搜索用户名..." onkeyup="filterUsers()"/>
<div class="card">
<table id="usersTable">
<thead><tr><th>用户名</th><th>注册时间</th><th>最后登录</th><th>剩余次数</th><th>状态</th><th>操作</th></tr></thead>
<tbody id="usersBody"></tbody>
</table>
</div>
</div>

<div id="vipPage" class="page">
<input type="text" class="search-box" id="vipSearch" placeholder="搜索用户名..." onkeyup="filterVip()"/>
<div class="card">
<table id="vipTable">
<thead><tr><th>用户名</th><th>会员到期</th><th>状态</th><th>操作</th></tr></thead>
<tbody id="vipBody"></tbody>
</table>
</div>
</div>

<div id="cardsPage" class="page">
<div class="card" style="margin-bottom:20px;">
<h3 style="margin-bottom:16px;">生成新卡密</h3>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:12px;align-items:end;">
<div class="form-group" style="margin:0;">
<label>次数</label>
<input type="number" id="cardCount" value="10" min="1" style="padding:10px;"/>
</div>
<div class="form-group" style="margin:0;">
<label>数量</label>
<input type="number" id="cardNum" value="1" min="1" max="50" style="padding:10px;"/>
</div>
<div class="form-group" style="margin:0;">
<label>有效期（天）</label>
<input type="number" id="cardDays" value="30" min="1" style="padding:10px;"/>
</div>
<button class="btn btn-primary" onclick="generateCards()" style="padding:10px 20px;">生成卡密</button>
</div>
</div>
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
<input type="text" class="search-box" id="cardSearch" placeholder="搜索卡密..." onkeyup="filterCards()" style="margin:0;max-width:400px;"/>
<div style="display:flex;gap:8px;">
<button class="btn btn-danger" onclick="deleteExpiredCards()">🗑️ 删除过期卡密</button>
<button class="btn btn-danger" onclick="deleteUsedCards()">🗑️ 删除已用卡密</button>
</div>
</div>
<div class="card">
<table id="cardsTable">
<thead><tr><th>卡密</th><th>次数</th><th>有效期</th><th>状态</th><th>使用者</th><th>操作</th></tr></thead>
<tbody id="cardsBody"></tbody>
</table>
</div>
</div>

<div id="passwordPage" class="page">
<div class="card" style="max-width:500px;">
<h3 style="margin-bottom:20px;">修改管理员密码</h3>
<div class="form-group">
<label>旧密码</label>
<input type="password" id="oldPwd" placeholder="请输入旧密码"/>
</div>
<div class="form-group">
<label>新密码</label>
<input type="password" id="newPwd" placeholder="请输入新密码"/>
</div>
<div class="form-group">
<label>确认新密码</label>
<input type="password" id="newPwd2" placeholder="再次输入新密码"/>
</div>
<button class="btn btn-primary" onclick="changeAdminPwd()">确认修改</button>
</div>
</div>
</div>
</div>

<div class="modal-mask" id="editModal">
<div class="modal">
<h3 id="modalTitle">编辑</h3>
<div id="modalContent"></div>
<div class="form-actions">
<button class="btn btn-secondary" onclick="closeModal()">取消</button>
<button class="btn btn-primary" id="modalConfirm">确认</button>
</div>
</div>
</div>

<script>
const DB_KEY='vd_users';
const ADMIN_PWD_KEY='vd_admin_pwd';
const CARDS_KEY='vd_cards';
function hashPwd(s){let h=0;for(let i=0;i<s.length;i++)h=(Math.imul(31,h)+s.charCodeAt(i))|0;return h.toString(36);}
function getUsers(){
const data=JSON.parse(localStorage.getItem(DB_KEY)||'{}');
// 数据迁移：将旧格式（字符串密码）转换为新格式（对象）
Object.keys(data).forEach(name=>{
if(typeof data[name]==='string'){
// 旧格式：users[name] = "hashedPassword"
const oldPwd=data[name];
data[name]={
pwd:oldPwd,
regTime:'未知',
lastLogin:'未知',
loginLogs:[],
vip:false,
vipExpire:'',
parseCount:10,
parseLimit:10,
banned:false
};
}
});
return data;
}
function saveUsers(u){localStorage.setItem(DB_KEY,JSON.stringify(u))}
function getAdminPwd(){return localStorage.getItem(ADMIN_PWD_KEY)||hashPwd('admin123')}
function setAdminPwd(p){localStorage.setItem(ADMIN_PWD_KEY,p)}
function getCards(){return JSON.parse(localStorage.getItem(CARDS_KEY)||'[]')}
function saveCards(c){localStorage.setItem(CARDS_KEY,JSON.stringify(c))}
function generateCardCode(){return 'VD'+Date.now().toString(36).toUpperCase()+Math.random().toString(36).substr(2,6).toUpperCase();}

function adminLogin(){
const user=document.getElementById('adminUser').value.trim();
const pwd=document.getElementById('adminPwd').value;
// 验证用户名和密码
if(user!=='aye'){alert('用户名错误');return}
if(pwd!=='yy888888'){alert('密码错误');return}
document.getElementById('loginModal').classList.remove('show');
document.getElementById('adminPanel').style.display='';
loadOverview();
}

function adminLogout(){
document.getElementById('adminPanel').style.display='none';
document.getElementById('loginModal').classList.add('show');
document.getElementById('adminUser').value='';
document.getElementById('adminPwd').value='';
}

function switchPage(page){
document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
event.target.classList.add('active');
document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
const pages={overview:'数据概览',users:'用户管理',vip:'会员管理',cards:'卡密管理',password:'修改密码'};
document.getElementById('pageTitle').textContent=pages[page];
document.getElementById(page+'Page').classList.add('active');
if(page==='overview')loadOverview();
if(page==='users')loadUsers();
if(page==='vip')loadVip();
if(page==='cards')loadCards();
}

function loadOverview(){
const users=getUsers();
const arr=Object.values(users);
const total=arr.length;
const vipCount=arr.filter(u=>u.vip&&u.vipExpire&&new Date(u.vipExpire)>new Date()).length;
const today=new Date().toLocaleDateString('zh-CN');
const todayLogin=arr.filter(u=>u.lastLogin&&u.lastLogin.startsWith(today)).length;
const totalParse=arr.reduce((sum,u)=>sum+(u.parseLimit||0),0);
document.getElementById('statsCards').innerHTML=`
<div class="stat-card"><div class="stat-label">总用户数</div><div class="stat-value">${total}</div></div>
<div class="stat-card"><div class="stat-label">今日登录</div><div class="stat-value">${todayLogin}</div></div>
<div class="stat-card"><div class="stat-label">会员用户</div><div class="stat-value">${vipCount}</div></div>
<div class="stat-card"><div class="stat-label">总解析次数</div><div class="stat-value">${totalParse}</div></div>
`;
}

function loadUsers(){
const users=getUsers();
const tbody=document.getElementById('usersBody');
tbody.innerHTML='';
Object.keys(users).forEach(name=>{
const u=users[name];
const tr=document.createElement('tr');
tr.innerHTML=`
<td>${name}</td>
<td>${u.regTime||'-'}</td>
<td>${u.lastLogin||'-'}</td>
<td>${u.parseCount||0} / ${u.parseLimit===-1?'∞':u.parseLimit||0}</td>
<td><span class="badge ${u.banned?'badge-banned':'badge-normal'}">${u.banned?'已禁用':'正常'}</span></td>
<td>
<button class="btn btn-secondary" onclick="viewLogs('${name}')">登录记录</button>
<button class="btn btn-primary" onclick="editCount('${name}')">改次数</button>
<button class="btn ${u.banned?'btn-success':'btn-warn'}" onclick="toggleBan('${name}')">${u.banned?'启用':'禁用'}</button>
<button class="btn btn-danger" onclick="delUser('${name}')">删除</button>
</td>
`;
tbody.appendChild(tr);
});
}

function filterUsers(){
const q=document.getElementById('userSearch').value.toLowerCase();
document.querySelectorAll('#usersBody tr').forEach(tr=>{
tr.style.display=tr.textContent.toLowerCase().includes(q)?'':'none';
});
}

function viewLogs(name){
const users=getUsers();
const logs=users[name].loginLogs||[];
document.getElementById('modalTitle').textContent=`${name} 的登录记录`;
document.getElementById('modalContent').innerHTML=logs.length?logs.map(l=>`<div style="padding:8px;border-bottom:1px solid var(--border);">${l}</div>`).join(''):'<p class="empty">暂无记录</p>';
document.getElementById('modalConfirm').style.display='none';
document.getElementById('editModal').classList.add('show');
}

function editCount(name){
const users=getUsers();
const u=users[name];
if(!u){alert('用户不存在');return;}
document.getElementById('modalTitle').textContent='修改解析次数 - '+name;
document.getElementById('modalContent').innerHTML=`
<div class="form-group"><label>当前剩余次数</label><input type="number" id="inputCount" value="${u.parseCount||0}" min="0"/></div>
<div class="form-group"><label>总次数限制（-1表示无限）</label><input type="number" id="inputLimit" value="${u.parseLimit||0}"/></div>
<div id="debugOutput" style="background:rgba(255,0,0,0.1);padding:10px;border-radius:6px;font-size:11px;margin-top:10px;display:none;"></div>
<p style="font-size:12px;color:var(--muted);margin-top:8px;">提示：修改后用户需刷新前台页面才能看到变化</p>
`;
document.getElementById('modalConfirm').style.display='';
document.getElementById('modalConfirm').onclick=()=>{
const debug=document.getElementById('debugOutput');
debug.style.display='block';
debug.innerHTML='<strong>调试信息：</strong><br>';
const countInput=document.getElementById('inputCount');
const limitInput=document.getElementById('inputLimit');
debug.innerHTML+=`1. 输入框元素: ${countInput?'找到':'未找到'} / ${limitInput?'找到':'未找到'}<br>`;
if(!countInput||!limitInput){alert('输入框未找到');return;}
const countVal=countInput.value;
const limitVal=limitInput.value;
debug.innerHTML+=`2. 输入框的值: "${countVal}" / "${limitVal}"<br>`;
const newCount=parseInt(countVal,10);
const newLimit=parseInt(limitVal,10);
debug.innerHTML+=`3. parseInt结果: ${newCount} / ${newLimit}<br>`;
debug.innerHTML+=`4. 是否NaN: ${isNaN(newCount)} / ${isNaN(newLimit)}<br>`;
const users2=getUsers();
if(!users2[name]){alert('用户数据丢失');return;}
debug.innerHTML+=`5. 修改前: parseCount=${users2[name].parseCount}, parseLimit=${users2[name].parseLimit}<br>`;
users2[name].parseCount=isNaN(newCount)?0:newCount;
users2[name].parseLimit=isNaN(newLimit)?0:newLimit;
debug.innerHTML+=`6. 修改后: parseCount=${users2[name].parseCount}, parseLimit=${users2[name].parseLimit}<br>`;
saveUsers(users2);
const saved=getUsers();
debug.innerHTML+=`7. 保存并重新读取: parseCount=${saved[name].parseCount}, parseLimit=${saved[name].parseLimit}<br>`;
debug.innerHTML+=`<br><strong style="color:#00ffaa">如果上面显示的数字正确，说明保存成功了！</strong>`;
setTimeout(()=>{
closeModal();
loadUsers();
alert(`修改成功！\n用户：${name}\n剩余次数：${saved[name].parseCount}\n总限制：${saved[name].parseLimit===-1?'无限':saved[name].parseLimit}`);
},3000);
};
document.getElementById('editModal').classList.add('show');
}

function toggleBan(name){
const users=getUsers();
users[name].banned=!users[name].banned;
saveUsers(users);
loadUsers();
}

function delUser(name){
if(!confirm(`确定删除用户 ${name}？`))return;
const users=getUsers();
delete users[name];
saveUsers(users);
loadUsers();
}

function loadVip(){
const users=getUsers();
const tbody=document.getElementById('vipBody');
tbody.innerHTML='';
Object.keys(users).forEach(name=>{
const u=users[name];
if(!u.vip)return;
const expired=u.vipExpire&&new Date(u.vipExpire)<new Date();
const tr=document.createElement('tr');
tr.innerHTML=`
<td>${name}</td>
<td>${u.vipExpire||'-'}</td>
<td><span class="badge ${expired?'badge-banned':'badge-vip'}">${expired?'已过期':'有效'}</span></td>
<td>
<button class="btn btn-primary" onclick="openVip('${name}')">续费</button>
<button class="btn btn-danger" onclick="cancelVip('${name}')">取消会员</button>
</td>
`;
tbody.appendChild(tr);
});
if(tbody.children.length===0)tbody.innerHTML='<tr><td colspan="4" class="empty">暂无会员用户</td></tr>';
}

function filterVip(){

tr.style.display=tr.textContent.toLowerCase().includes(q)?'':'none';
});
}

function openVip(name){
document.getElementById('modalTitle').textContent='开通/续费会员';
document.getElementById('modalContent').innerHTML=`
<div class="form-group"><label>用户名</label><input type="text" id="vipUser" value="${name||''}" ${name?'readonly':''}/></div>
<div class="form-group"><label>时长</label><select id="vipDuration">
<option value="1">1个月</option>
<option value="3">3个月</option>
<option value="12">1年</option>
<option value="-1">永久</option>
</select></div>
`;
document.getElementById('modalConfirm').style.display='';
document.getElementById('modalConfirm').onclick=()=>{
const u=document.getElementById('vipUser').value.trim();
const d=parseInt(document.getElementById('vipDuration').value);
if(!u){alert('请输入用户名');return}
const users=getUsers();
if(!users[u]){alert('用户不存在');return}
users[u].vip=true;
if(d===-1){
users[u].vipExpire='2099-12-31';
}else{
const now=users[u].vipExpire&&new Date(users[u].vipExpire)>new Date()?new Date(users[u].vipExpire):new Date();
now.setMonth(now.getMonth()+d);
users[u].vipExpire=now.toLocaleDateString('zh-CN');
}
saveUsers(users);
closeModal();
loadVip();
alert('操作成功');
};
document.getElementById('editModal').classList.add('show');
}

function cancelVip(name){
if(!confirm(`确定取消 ${name} 的会员？`))return;
const users=getUsers();
users[name].vip=false;
users[name].vipExpire='';
saveUsers(users);
loadVip();
}

function changeAdminPwd(){
const old=document.getElementById('oldPwd').value;
const n1=document.getElementById('newPwd').value;
const n2=document.getElementById('newPwd2').value;
if(hashPwd(old)!==getAdminPwd()){alert('旧密码错误');return}
if(!n1||n1.length<6){alert('新密码至少6位');return}
if(n1!==n2){alert('两次密码不一致');return}
setAdminPwd(hashPwd(n1));
alert('密码修改成功，请重新登录');
adminLogout();
}

// 导出Excel功能
function exportUsersExcel(){
const users=getUsers();
const rows=[];
// 表头
rows.push(['用户名','注册时间','最后登录','剩余次数','次数限制','会员状态','会员到期','是否禁用','登录次数']);
// 数据行
Object.keys(users).forEach(name=>{
const u=users[name];
const isVip=u.vip&&u.vipExpire&&new Date(u.vipExpire)>new Date();
rows.push([
name,
u.regTime||'未知',
u.lastLogin||'未知',
u.parseCount||0,
u.parseLimit===-1?'无限':u.parseLimit||0,
isVip?'是':'否',
u.vipExpire||'-',
u.banned?'是':'否',
(u.loginLogs||[]).length
]);
});
downloadExcel(rows,`用户数据_${new Date().toISOString().slice(0,10)}.csv`);
alert('用户数据Excel已导出');
}

function exportCardsExcel(){
const cards=getCards();
const rows=[];
// 表头
rows.push(['卡密','次数','有效天数','创建时间','过期时间','使用状态','使用者','使用时间']);
// 数据行
cards.forEach(card=>{
const expired=new Date(card.expireTime)<new Date();
rows.push([
card.code,
card.count,
card.days,
card.createTime,
card.expireTime,
card.used?'已使用':expired?'已过期':'未使用',
card.usedBy||'-',
card.usedTime||'-'
]);
});
downloadExcel(rows,`卡密数据_${new Date().toISOString().slice(0,10)}.csv`);
alert('卡密数据Excel已导出');
}

function downloadExcel(rows,filename){
// 转换为CSV格式（Excel可以打开）
let csv='\uFEFF'; // UTF-8 BOM，确保中文正常显示
rows.forEach(row=>{
csv+=row.map(cell=>{
// 处理包含逗号、引号、换行的单元格
const str=String(cell).replace(/"/g,'""');
return `"${str}"`;
}).join(',')+'\n';
});
// 下载
const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');
a.href=url;
a.download=filename;
a.click();
URL.revokeObjectURL(url);
}

function generateCards(){
const count=parseInt(document.getElementById('cardCount').value)||10;
const num=parseInt(document.getElementById('cardNum').value)||1;
const days=parseInt(document.getElementById('cardDays').value)||30;
if(num>50){alert('单次最多生成50个卡密');return;}
const cards=getCards();
const newCards=[];
for(let i=0;i<num;i++){
const card={
code:generateCardCode(),
count:count,
days:days,
createTime:new Date().toLocaleString('zh-CN'),
expireTime:new Date(Date.now()+days*24*60*60*1000).toLocaleString('zh-CN'),
used:false,
usedBy:'',
usedTime:''
};
cards.push(card);
newCards.push(card.code);
}
saveCards(cards);
loadCards();
alert(`成功生成 ${num} 个卡密！\n\n${newCards.join('\n')}\n\n请复制保存`);
}

function loadCards(){
const cards=getCards();
const tbody=document.getElementById('cardsBody');
tbody.innerHTML='';
cards.reverse().forEach(card=>{
const expired=new Date(card.expireTime)<new Date();
const tr=document.createElement('tr');
tr.innerHTML=`
<td style="font-family:monospace;font-size:12px;">${card.code}</td>
<td>${card.count} 次</td>
<td>${card.expireTime}</td>
<td><span class="badge ${card.used?'badge-banned':expired?'badge-banned':'badge-success'}">${card.used?'已使用':expired?'已过期':'未使用'}</span></td>
<td>${card.usedBy||'-'}</td>
<td><button class="btn btn-danger" onclick="delCard('${card.code}')">删除</button></td>
`;
tbody.appendChild(tr);
});
if(tbody.children.length===0)tbody.innerHTML='<tr><td colspan="6" class="empty">暂无卡密</td></tr>';
}

function filterCards(){
const q=document.getElementById('cardSearch').value.toLowerCase();
document.querySelectorAll('#cardsBody tr').forEach(tr=>{
tr.style.display=tr.textContent.toLowerCase().includes(q)?'':'none';
});
}

function delCard(code){
if(!confirm(`确定删除卡密 ${code}？`))return;
const cards=getCards();
const idx=cards.findIndex(c=>c.code===code);
if(idx>-1)cards.splice(idx,1);
saveCards(cards);
loadCards();
}

function deleteExpiredCards(){
const cards=getCards();
const now=new Date();
const expired=cards.filter(c=>new Date(c.expireTime)<now);
if(expired.length===0){alert('没有过期的卡密');return;}
if(!confirm(`确定删除 ${expired.length} 个过期卡密？`))return;
const remaining=cards.filter(c=>new Date(c.expireTime)>=now);
saveCards(remaining);
loadCards();
alert(`已删除 ${expired.length} 个过期卡密`);
}

function deleteUsedCards(){
const cards=getCards();
const used=cards.filter(c=>c.used);
if(used.length===0){alert('没有已使用的卡密');return;}
if(!confirm(`确定删除 ${used.length} 个已使用的卡密？`))return;
const remaining=cards.filter(c=>!c.used);
saveCards(remaining);
loadCards();
alert(`已删除 ${used.length} 个已使用的卡密`);
}
