<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 抖音风格 V2 - 简约版 -->
  
  <!-- 深色背景 -->
  <rect width="400" height="400" fill="#161823"/>
  
  <!-- 主音符 - 白色 -->
  <g transform="translate(200, 180)">
    <circle cx="0" cy="60" r="50" fill="#ffffff"/>
    <circle cx="0" cy="-10" r="35" fill="#ffffff"/>
    <rect x="32" y="-75" width="20" height="135" fill="#ffffff" rx="10"/>
    <ellipse cx="52" cy="-75" rx="28" ry="16" fill="#ffffff"/>
  </g>
  
  <!-- 青色光晕 -->
  <circle cx="205" cy="240" r="55" fill="#00f2ea" opacity="0.3"/>
  
  <!-- 红色光晕 -->
  <circle cx="195" cy="170" r="40" fill="#fe2c55" opacity="0.3"/>
  
  <!-- KIRO 文字 - 渐变效果 -->
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f2ea"/>
      <stop offset="100%" style="stop-color:#fe2c55"/>
    </linearGradient>
  </defs>
  
  <text x="200" y="340" 
        font-family="Arial Black, sans-serif" 
        font-size="65" 
        font-weight="900" 
        text-anchor="middle"
        fill="url(#textGrad)"
        letter-spacing="3">KIRO</text>
</svg>